<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hall of Fame</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <h1 class="text-center mb-4">Wall of Champions</h1>
        <div class="game-grid" id="winnerGrid"></div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { injectNavbar } from './js/navbar.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        injectNavbar();

        async function loadWinners() {
            const grid = document.getElementById('winnerGrid');
            grid.innerHTML = '<p class="text-center text-muted" style="grid-column: 1/-1;">Loading champions...</p>';

            const snap = await getDocs(collection(db, "winners"));
            let htmlContent = "";
            snap.forEach((doc) => {
                const w = doc.data();
                htmlContent += `
                    <div class="card text-center" style="border-top: 4px solid var(--accent);">
                        <img src="${w.img}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin:0 auto 15px; border:4px solid var(--accent);">
                        <div class="mono text-muted mb-2">${w.eventName}</div>
                        <h2 class="mb-1">${w.name}</h2>
                        <div class="badge-accent mt-3">
                            <strong>Won: ${w.tier}</strong>
                        </div>
                    </div>`;
            });
            grid.innerHTML = htmlContent || '<p class="text-center text-muted" style="grid-column: 1/-1;">No champions yet.</p>';
        }
        loadWinners();
    </script>
</body>
</html>
