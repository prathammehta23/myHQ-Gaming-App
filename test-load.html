<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myHQ Arcade | Quiz Load Test</title>
  <style>
    body { font-family: 'Inter', sans-serif; padding: 20px; background: #f8faff; color: #333; }
    .log-container { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-top: 20px; height: 600px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; }
    .log-entry { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #f1f5f9; }
    .log-entry.success { color: #10b981; }
    .log-entry.error { color: #ef4444; }
    .log-entry.system { color: #8b5cf6; font-weight: bold; }
    .log-entry.admin { color: #f59e0b; font-weight: bold; }
  </style>
</head>
<body>
  <h1>myHQ Quiz - Full E2E Simulation (50 Players)</h1>
  <p>This script simulates the Admin creating a room with 4 questions, and 50 players joining and playing the entire game.</p>
  <button id="runTestBtn" style="padding: 10px 20px; background: #1e4ed8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Run Full 50-Player Game Simulation</button>
  
  <div class="log-container" id="log"></div>

  <script type="module">
    import { rtdb } from './js/firebase-config.js';
    import { ref, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import './js/quiz.js';

    const logEl = document.getElementById('log');
    function log(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `log-entry ${type}`;
      el.textContent = `[${new Date().toISOString().substring(11,23)}] ${msg}`;
      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    const wait = (ms) => new Promise(r => setTimeout(r, ms));

    async function runTest() {
      document.getElementById('runTestBtn').disabled = true;
      log("Starting Full Game Simulation...", "system");
      
      try {
        const questions = [
          { type: 'multiple-choice', text: 'Q1: What is 2 + 2?', options: ['3','4','5','6'], correct: 1, time: 15 },
          { type: 'multiple-choice', text: 'Q2: Capital of France?', options: ['London','Berlin','Paris','Madrid'], correct: 2, time: 15 },
          { type: 'multiple-choice', text: 'Q3: Best Programming Language?', options: ['Java','Python','JavaScript','C++'], correct: 2, time: 15 },
          { type: 'multiple-choice', text: 'Q4: Is the earth flat?', options: ['Yes','No','Maybe','It is a cube'], correct: 1, time: 15 }
        ];

        // 1. Admin creates room
        log("Admin creating room...", "admin");
        const sid = await window.quiz.createRoom({
            title: '50-Player Load Test Room',
            sessionId: 'TEST50',
            questions: questions
        });
        log(`Room created: ${sid}`, "admin");

        // 2. 50 Players Join
        log("Spawning 50 bots...", "system");
        const playerIds = [];
        const joinPromises = [];
        for (let i = 0; i < 50; i++) {
            joinPromises.push((async () => {
                const pid = await window.quiz.joinRoom(sid, `Bot ${i}`, '🤖');
                playerIds.push(pid);
            })());
        }
        await Promise.all(joinPromises);
        log(`50 bots joined the room successfully.`, "success");

        // 3. Play the game loop
        for (let qIdx = 0; qIdx < questions.length; qIdx++) {
            log(`--- Starting Round ${qIdx + 1} ---`, "system");
            
            // Admin starts question
            log(`Admin starts Question ${qIdx + 1}`, "admin");
            await window.quiz.startQuestion(sid, qIdx);
            
            // Wait 2 seconds for players to "read"
            await wait(2000);

            // 50 players submit answers concurrently with slight jitter
            log(`50 bots are submitting answers for Question ${qIdx + 1}...`, "system");
            const answerPromises = playerIds.map(async (pid, i) => {
                await wait(Math.random() * 2000); // jitter between 0-2s
                const randomChoice = Math.floor(Math.random() * 4);
                const success = await window.quiz.submitAnswer(sid, qIdx, pid, randomChoice);
                if (!success) {
                    log(`Bot ${i} failed to submit answer!`, "error");
                }
            });

            await Promise.all(answerPromises);
            log(`All 50 bots submitted answers.`, "success");

            // Admin ends question (Reveal phase)
            await wait(1000);
            log(`Admin ends Question ${qIdx + 1} (Reveal phase)`, "admin");
            await window.quiz.endQuestion(sid);

            // Admin shows leaderboard
            await wait(2000);
            log(`Admin shows Leaderboard for Question ${qIdx + 1}`, "admin");
            await window.quiz.showLeaderboard(sid);

            await wait(3000); // Wait on leaderboard before next question
        }

        // Finish
        log(`--- Game Over ---`, "system");
        log(`Admin finishing the game.`, "admin");
        await window.quiz.startQuestion(sid, questions.length); // triggers 'finished' state
        
        log(`Simulation completed successfully! No crash detected.`, "success");

      } catch (err) {
        log(`Simulation Error: ${err.message}`, "error");
        console.error(err);
      } finally {
        document.getElementById('runTestBtn').disabled = false;
      }
    }
    
    document.getElementById('runTestBtn').addEventListener('click', runTest);
  </script>
</body>
</html>
