<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myHQ Arcade | Loot Room</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;
        }
        .modal-card {
            background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 900px;
            max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--card-shadow);
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #64748b; font-weight: bold; line-height: 1;
            border: none; background: transparent; padding: 0;
        }
        .close-btn:hover { color: #000; }
        .event-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border-top: 4px solid var(--accent); width: 100%; font: inherit; color: inherit; text-align: center; appearance: none; -webkit-appearance: none; }
        .event-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow); }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <h1 class="text-center mb-4">The Stash</h1>
        <p class="text-center text-muted mb-4">Select an event to view its incredible prizes.</p>
        <div class="game-grid" id="eventGrid"></div>
    </div>

    <!-- Modal for showing prizes -->
    <div class="modal-overlay" id="prizeModal" role="dialog" aria-modal="true" aria-labelledby="modalEventTitle">
        <div class="modal-card">
            <button type="button" class="close-btn" id="closeModalBtn" aria-label="Close prizes modal">×</button>
            <h2 id="modalEventTitle" class="mb-4 text-center">Event Prizes</h2>
            <div class="game-grid" id="modalPrizeGrid"></div>
        </div>
    </div>

    <script type="module">
        import { db, rtdb } from './js/firebase-config.js';
        import { injectNavbar } from './js/navbar.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { ref as rtdbRef, get as rtdbGet } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        injectNavbar();

        let eventsMap = {}; // Will hold eventName -> array of prizes

        function normalizeEventName(rawName) {
            return String(rawName || 'Unnamed Event')
                .replace(/\s*\[[^\]]*\]\s*$/i, '')
                .replace(/,\s*\d+\s*prizes?\s*,\s*\d+\s*winners?\s*$/i, '')
                .replace(/\s*\((bingo|word\s*trial|clue\s*cascade|family\s*feud|anagram|external|game)\)\s*$/i, '')
                .trim() || 'Unnamed Event';
        }

        function safeUrl(value) {
            if (!value) return '';
            try {
                const url = new URL(String(value), window.location.href);
                return ['http:', 'https:'].includes(url.protocol) ? url.href : '';
            } catch (err) {
                return '';
            }
        }

        async function loadEventsWithPrizes() {
            const grid = document.getElementById('eventGrid');
            grid.innerHTML = '<p class="text-center text-muted" style="grid-column: 1/-1;">Loading events...</p>';
            
            const snap = await getDocs(collection(db, "prizes"));
            eventsMap = {};
            
            snap.forEach((doc) => {
                const p = doc.data();
                const eventName = normalizeEventName(p.eventName);
                if (!eventsMap[eventName]) eventsMap[eventName] = [];
                eventsMap[eventName].push(p);
            });

            const eventNames = Object.keys(eventsMap);
            if (eventNames.length === 0) {
                grid.innerHTML = '<p class="text-center text-muted" style="grid-column: 1/-1;">No prizes found.</p>';
                return;
            }

            grid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            eventNames.forEach((evtName) => {
                const prizesCount = eventsMap[evtName].length;
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'card event-card text-center';
                button.dataset.eventName = evtName;

                const icon = document.createElement('div');
                icon.style.fontSize = '3rem';
                icon.style.marginBottom = '10px';
                icon.textContent = '🎁';

                const titleEl = document.createElement('h2');
                titleEl.className = 'mb-2';
                titleEl.textContent = evtName;

                const badge = document.createElement('div');
                badge.className = 'badge-accent mt-2';
                badge.style.display = 'inline-block';
                const strong = document.createElement('strong');
                strong.textContent = `${prizesCount} Prize${prizesCount > 1 ? 's' : ''}`;
                badge.appendChild(strong);

                const hint = document.createElement('p');
                hint.className = 'text-muted mt-3';
                hint.style.fontSize = '0.9rem';
                hint.textContent = 'Click to view stash →';

                button.append(icon, titleEl, badge, hint);
                fragment.appendChild(button);
            });
            grid.appendChild(fragment);
        }

        window.openModal = (eventName) => {
            const modal = document.getElementById('prizeModal');
            const title = document.getElementById('modalEventTitle');
            const grid = document.getElementById('modalPrizeGrid');
            
            title.innerText = eventName + ' - Prizes';
            
            const prizes = eventsMap[eventName] || [];
            grid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            prizes.forEach((p) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.boxShadow = 'none';
                card.style.border = '1px solid #e2e8f0';

                const tier = document.createElement('div');
                tier.className = 'mono badge-accent';
                tier.style.position = 'absolute';
                tier.style.top = '15px';
                tier.style.right = '15px';
                tier.textContent = p.tier || '--';

                const media = document.createElement('div');
                media.style.height = '150px';
                media.style.background = 'rgba(255,255,255,0.05)';
                media.style.borderRadius = '12px';
                media.style.marginBottom = '15px';
                media.style.display = 'flex';
                media.style.alignItems = 'center';
                media.style.justifyContent = 'center';
                media.style.padding = '10px';

                const imgUrl = safeUrl(p.img);
                if (imgUrl) {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.alt = `${p.name || 'Prize'} image`;
                    img.style.maxHeight = '100%';
                    img.style.maxWidth = '100%';
                    img.style.borderRadius = '8px';
                    media.appendChild(img);
                } else {
                    media.textContent = 'No prize image';
                }

                const nameEl = document.createElement('h3');
                nameEl.className = 'mb-1';
                nameEl.textContent = p.name || 'Unnamed Prize';

                card.append(tier, media, nameEl);
                fragment.appendChild(card);
            });
            
            grid.appendChild(fragment);
            modal.style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('prizeModal').style.display = 'none';
        };

        document.getElementById('eventGrid').addEventListener('click', (event) => {
            const trigger = event.target.closest('[data-event-name]');
            if (trigger) {
                window.openModal(trigger.dataset.eventName);
            }
        });

        document.getElementById('closeModalBtn').addEventListener('click', window.closeModal);

        // Close when clicking outside the modal content
        window.onclick = function(event) {
            const modal = document.getElementById('prizeModal');
            if (event.target == modal) {
                closeModal();
            }
        };

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                window.closeModal();
            }
        });

        loadEventsWithPrizes();
    </script>
</body>
</html>
