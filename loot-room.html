<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loot Room</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <h1 class="text-center mb-4">The Stash</h1>
        <div class="game-grid" id="prizeGrid"></div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { injectNavbar } from './js/navbar.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        injectNavbar();

        async function loadPrizes() {
            const grid = document.getElementById('prizeGrid');
            grid.innerHTML = '<p class="text-center text-muted" style="grid-column: 1/-1;">Loading stash...</p>';
            
            const snap = await getDocs(collection(db, "prizes"));
            let htmlContent = "";
            snap.forEach((doc) => {
                const p = doc.data();
                htmlContent += `
                    <div class="card">
                        <div class="mono badge-accent" style="position:absolute; top:15px; right:15px;">${p.tier}</div>
                        <div style="height:150px; background:rgba(255,255,255,0.05); border-radius:12px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; padding:10px;">
                            <img src="${p.img}" style="max-height:100%; border-radius:8px;">
                        </div>
                        <h3 class="mb-1">${p.name}</h3>
                        <p class="text-muted" style="font-size:0.85rem;">For: ${p.eventName}</p>
                    </div>`;
            });
            grid.innerHTML = htmlContent || '<p class="text-center text-muted" style="grid-column: 1/-1;">No prizes found.</p>';
        }
        loadPrizes();
    </script>
</body>
</html>
